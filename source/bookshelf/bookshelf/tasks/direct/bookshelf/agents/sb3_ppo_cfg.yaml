# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

# Total environment steps (rollouts × n_steps × num_envs). Increase for longer training.
# Example: 5e6 ≈ 5M steps; 10e6 for harder tasks. CLI override: --max_iterations N
n_timesteps: !!float 2e7
policy: 'MlpPolicy'
n_steps: 32
batch_size: 8192
gae_lambda: 0.95
gamma: 0.99
n_epochs: 10
ent_coef: 0.01
learning_rate: !!float 1e-4
clip_range: !!float 0.2
# Stabilizers to avoid numerical blow-ups (NaNs) on long runs.
# These are consumed by `scripts/sb3/train.py` and applied via VecNormalize.
normalize_input: true
clip_obs: 10.0
policy_kwargs:
  activation_fn: nn.ELU
  net_arch: [32, 32]
  squash_output: False
vf_coef: 1.0
max_grad_norm: 1.0
device: "cuda:0"